<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Malu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --crimson: #8b1a1a;
            --crimson-glow: rgba(139,26,26,0.18);
            --crimson-dim: rgba(139,26,26,0.08);
            --bg: #030303;
            --surface: #0a0505;
            --text: #d4c5b0;
            --muted: rgba(212,197,176,0.35);
            --thorn: rgba(212,197,176,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Josefin Sans', sans-serif;
            overflow-x: hidden;
        }

        /* PARTÍCULAS */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--crimson);
            opacity: 0;
            animation: drift var(--d) ease-in-out var(--delay) infinite;
        }

        @keyframes drift {
            0%   { opacity: 0; transform: translateY(100vh) scale(0.3); }
            15%  { opacity: var(--op); }
            85%  { opacity: var(--op); }
            100% { opacity: 0; transform: translateY(-10vh) scale(1) rotate(360deg); }
        }

        /* VINHETA */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.92) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* LAYOUT */
        .stage {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
        }

        .container {
            max-width: 560px;
            width: 100%;
            text-align: center;
            animation: revealIn 2s ease forwards;
            opacity: 0;
        }

        @keyframes revealIn {
            0%   { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ORNAMENTO SUPERIOR */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 52px;
        }

        .ornament-line {
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, var(--crimson));
        }

        .ornament-line.rev {
            background: linear-gradient(90deg, var(--crimson), transparent);
        }

        .ornament-rose {
            width: 36px;
            height: 36px;
            position: relative;
        }

        /* Rosa SVG animada */
        .rose-svg {
            width: 36px;
            height: 36px;
            animation: rosePulse 4s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(139,26,26,0.6));
        }

        @keyframes rosePulse {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(139,26,26,0.5)); }
            50%       { filter: drop-shadow(0 0 12px rgba(180,30,30,0.9)); }
        }

        /* TÍTULO */
        .eyebrow {
            font-size: 0.52rem;
            letter-spacing: 8px;
            color: var(--crimson);
            text-transform: uppercase;
            margin-bottom: 52px;
            opacity: 0.8;
        }

        /* POEMA */
        .poem-wrap {
            position: relative;
            padding: 0 10px;
            margin-bottom: 60px;
        }

        /* Barra lateral vermelha */
        .poem-wrap::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, transparent, var(--crimson) 30%, var(--crimson) 70%, transparent);
            opacity: 0.5;
        }

        .poem {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: clamp(1.3rem, 4vw, 1.85rem);
            line-height: 1.85;
            color: var(--text);
            text-align: left;
            letter-spacing: 0.01em;
        }

        .poem .line {
            display: block;
            opacity: 0;
            transform: translateX(-12px);
            animation: lineIn 0.9s ease forwards;
        }

        .poem .line:nth-child(1) { animation-delay: 0.6s; }
        .poem .line:nth-child(2) { animation-delay: 1.1s; }
        .poem .line:nth-child(3) { animation-delay: 1.6s; }
        .poem .line:nth-child(4) { animation-delay: 2.1s; }
        .poem .line:nth-child(5) { animation-delay: 2.6s; }

        @keyframes lineIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .poem .highlight {
            color: #c0392b;
            font-style: italic;
        }

        /* DIVISOR */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
            opacity: 0;
            animation: lineIn 0.8s ease 3.2s forwards;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,26,26,0.4));
        }

        .divider-line.rev {
            background: linear-gradient(90deg, rgba(139,26,26,0.4), transparent);
        }

        .divider-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--crimson);
            opacity: 0.7;
        }

        /* ASSINATURA */
        .signature-wrap {
            opacity: 0;
            animation: lineIn 0.8s ease 3.6s forwards;
        }

        .signature {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* BOTÃO VOLTAR */
        .back-wrap {
            margin-top: 60px;
            opacity: 0;
            animation: lineIn 0.8s ease 4.2s forwards;
        }

        .btn-back {
            background: transparent;
            color: rgba(139,26,26,0.5);
            border: 1px solid rgba(139,26,26,0.2);
            padding: 10px 32px;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s ease;
            border-radius: 2px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            color: #c0392b;
            border-color: rgba(139,26,26,0.45);
            box-shadow: 0 0 20px rgba(139,26,26,0.08);
        }

        /* NÉVOA DE FUNDO */
        .fog {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .fog-1 {
            width: 500px;
            height: 500px;
            background: rgba(100, 8, 8, 0.07);
            top: -100px;
            left: -150px;
            animation: fogDrift 18s ease-in-out infinite alternate;
        }

        .fog-2 {
            width: 400px;
            height: 400px;
            background: rgba(80, 5, 5, 0.05);
            bottom: -80px;
            right: -100px;
            animation: fogDrift 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes fogDrift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }
    </style>
</head>
<body>

<div id="particles"></div>
<div id="vignette"></div>
<div class="fog fog-1"></div>
<div class="fog fog-2"></div>

<div class="stage">
    <div class="container">

        <div class="ornament">
            <div class="ornament-line"></div>
            <!-- Rosa SVG minimalista -->
            <svg class="rose-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Caule -->
                <line x1="18" y1="32" x2="18" y2="18" stroke="#4a0e0e" stroke-width="1.2" stroke-linecap="round"/>
                <!-- Folhinhas -->
                <path d="M18 27 Q13 24 14 20 Q17 22 18 27Z" fill="#3a1010" opacity="0.8"/>
                <path d="M18 27 Q23 24 22 20 Q19 22 18 27Z" fill="#3a1010" opacity="0.6"/>
                <!-- Pétalas externas -->
                <path d="M18 18 Q12 14 13 9 Q17 11 18 18Z" fill="#7a1515"/>
                <path d="M18 18 Q24 14 23 9 Q19 11 18 18Z" fill="#8b1a1a"/>
                <path d="M18 18 Q10 17 10 11 Q15 12 18 18Z" fill="#6e1212"/>
                <path d="M18 18 Q26 17 26 11 Q21 12 18 18Z" fill="#7a1515"/>
                <path d="M18 18 Q14 8  18 5  Q22 8  18 18Z" fill="#9e1e1e"/>
                <!-- Centro -->
                <circle cx="18" cy="16" r="3.5" fill="#c0392b" opacity="0.9"/>
                <circle cx="18" cy="16" r="1.8" fill="#e74c3c" opacity="0.7"/>
            </svg>
            <div class="ornament-line rev"></div>
        </div>

        <p class="eyebrow">para a minha deusa</p>

        <div class="poem-wrap">
            <p class="poem">
                <span class="line">Oh minha deusa...</span>
                <span class="line">Eu colocaria minhas mãos</span>
                <span class="line">delicadamente nos <span class="highlight">espinhos</span></span>
                <span class="line">para pegar uma das <span class="highlight">rosas</span></span>
                <span class="line">mais perfeitas e elegantes</span>
                <span class="line">só para te ver <span class="highlight">feliz.</span></span>
            </p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-dot"></div>
            <div class="divider-line rev"></div>
        </div>

        <div class="signature-wrap">
            <p class="signature">com amor, mimi ❤️</p>
        </div>

        <div class="back-wrap">
            <a href="index.html" class="btn-back">← voltar</a>
        </div>

    </div>
</div>

<script>
    // Partículas flutuantes (pétalas/cinzas vermelhas)
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 1 + Math.random() * 3;
        p.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${Math.random() * 100}%;
            --d: ${6 + Math.random() * 10}s;
            --delay: ${-Math.random() * 12}s;
            --op: ${0.1 + Math.random() * 0.25};
        `;
        container.appendChild(p);
    }
</script>
</body>
</html>
